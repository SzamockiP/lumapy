name: Build

on:
  push:
    branches: [master, "release/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      # ── Vulkan SDK (Windows — installed on the host) ──────────
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "1.4.309.0"
          $INSTALLER = "VulkanSDK-$VERSION-Installer.exe"
          Invoke-WebRequest `
            -Uri "https://sdk.lunarg.com/sdk/download/$VERSION/windows/$INSTALLER" `
            -OutFile $INSTALLER
          Start-Process -FilePath ".\$INSTALLER" `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$VERSION" >> $env:GITHUB_ENV

      # ── Build ───────────────────────────────────────────────────
      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux* *-win32 *-manylinux_i686"
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Smoke test on every built wheel: the module imports and the .pyi stub
          # matches __all__. The GPU test suite can't run here (no Vulkan driver
          # in the containers) and stays a local concern.
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: python -c "import bazalt" && python -m pytest {project}/tests/test_stubs.py -q

          # Linux: install Vulkan SDK tarball + X11/Wayland deps
          # inside the manylinux Docker container (not the host).
          CIBW_BEFORE_ALL_LINUX: |
            set -e
            VULKAN_VERSION=1.4.309.0
            yum install -y wget tar xz \
              libX11-devel libXrandr-devel libXinerama-devel \
              libXcursor-devel libXi-devel \
              wayland-devel libxkbcommon-devel
            wget -q "https://sdk.lunarg.com/sdk/download/${VULKAN_VERSION}/linux/vulkansdk-linux-x86_64-${VULKAN_VERSION}.tar.xz" \
              -O /tmp/vulkansdk.tar.xz
            mkdir -p /opt/vulkan-sdk
            tar xf /tmp/vulkansdk.tar.xz -C /opt/vulkan-sdk --strip-components=1
            rm /tmp/vulkansdk.tar.xz

          CIBW_ENVIRONMENT_LINUX: >
            VULKAN_SDK=/opt/vulkan-sdk/x86_64
            PATH=/opt/vulkan-sdk/x86_64/bin:$PATH
            LD_LIBRARY_PATH=/opt/vulkan-sdk/x86_64/lib:${LD_LIBRARY_PATH:-}
            CMAKE_PREFIX_PATH=/opt/vulkan-sdk/x86_64

      # ── Upload ──────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Full GPU suite on lavapipe (Mesa software rasterizer) ─────
  # First CI leg that actually renders: deterministic, no GPU runner
  # needed. Mesa 24.x lavapipe advertises Vulkan 1.3, so this exercises
  # the 1.3-core path only — the 1.2+KHR-alias path remains untested.
  test_lavapipe:
    name: Tests · lavapipe
    needs: build_wheels
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-22.04
          path: wheelhouse

      # libvulkan1 is the Vulkan LOADER — mesa-vulkan-drivers ships only the
      # ICD, and without the loader every vkCreateInstance fails.
      # Validation layers come from LunarG's repo, not Ubuntu's: noble's
      # 1.3.275 layer does not report shader-access sync hazards at all, which
      # silently guts the manual-barrier negative test.
      - name: Install lavapipe + validation layers
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y libvulkan1 mesa-vulkan-drivers vulkan-validationlayers vulkan-tools
          dpkg -s vulkan-validationlayers | grep -E "^Version"

      # Asked of the package, not hardcoded: the manifest's location has
      # already moved between Ubuntu releases.
      - name: Locate the lavapipe ICD manifest
        run: |
          ICD=$(dpkg -L mesa-vulkan-drivers | grep -E 'lvp.*\.json$' | head -1)
          test -n "$ICD" || { echo "no lavapipe manifest in mesa-vulkan-drivers:"; dpkg -L mesa-vulkan-drivers; exit 1; }
          echo "lavapipe ICD: $ICD"
          echo "VK_ICD_FILENAMES=$ICD" >> "$GITHUB_ENV"
          echo "VK_DRIVER_FILES=$ICD" >> "$GITHUB_ENV"

      - name: Report the Vulkan device CI actually sees
        run: vulkaninfo --summary

      - name: Install wheel + test deps
        run: pip install wheelhouse/bazalt-*-cp312-*manylinux*.whl pytest numpy

      # TEMPORARY diagnostic: force sync validation via the layer-settings
      # FILE, bypassing the in-app VkValidationFeaturesEXT/VkLayerSettingEXT
      # plumbing. Passing here + failing below = the plumbing is at fault;
      # failing here too = the layer cannot see these hazards on this driver.
      - name: Sync validation diagnostic (temporary)
        continue-on-error: true
        working-directory: ${{ runner.temp }}
        run: |
          printf 'khronos_validation.validate_sync = true\nkhronos_validation.syncval_shader_accesses_heuristic = true\n' > vk_layer_settings.txt
          VK_LAYER_SETTINGS_PATH=$PWD/vk_layer_settings.txt python -m pytest "${{ github.workspace }}/tests/test_barriers.py::test_missing_barrier_in_manual_mode_trips_sync_validation" -q

      # cwd is OUTSIDE the repo on purpose: the source tree's bazalt/ package
      # has no _core and would shadow the installed wheel on sys.path.
      # VK_ICD_FILENAMES/VK_DRIVER_FILES come from the locate step's GITHUB_ENV.
      - name: Run test suite
        working-directory: ${{ runner.temp }}
        run: python -m pytest ${{ github.workspace }}/tests -q

  # ── Publish to PyPI on release ────────────────────────────────
  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
